version: "3.9"

services:

  # ── ChromaDB — Vector Database ─────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - app_network

  # ── Backend — FastAPI + Uvicorn ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - ./data:/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - chromadb
    command: >
      sh -c "echo 'Waiting for ChromaDB...' &&
             sleep 8 &&
             uvicorn main:app --host 0.0.0.0 --port 8080 --reload"
    networks:
      - app_network
    restart: on-failure

  # ── Frontend — Vite dev server ─────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    networks:
      - app_network

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  chromadb_data:
    driver: local

# ── Network ────────────────────────────────────────────────────────────────────
networks:
  app_network:
    driver: bridge